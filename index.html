<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio | Dev & Specialist</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="icon" type="image/png" href="favicon-32x32.png">
</head>

<body>

  <main class="glass-container">
    <header>
      <h1>Olá, eu sou <span class="highlight">Victor</span></h1>
      <p id="typewriter">Desenvolvedor Software Engineering</p>
    </header>

    <section class="bento-grid">
      <div class="card">
        <i data-lucide="code-2"></i>
        <h3>Backend</h3>
        <p>PHP, REST APIs & SQL</p>
      </div>
      <div class="card">
        <i data-lucide="cloud"></i>
        <h3>IT Admin</h3>
        <p>Google Workspace & Automação</p>
      </div>
      <div class="card">
        <i data-lucide="trophy"></i>
        <h3>Interesses</h3>
        <p>Cartola FC & Lifestyle</p>
      </div>
    </section>

    <footer>
      <a href="https://github.com" class="btn">GitHub</a>
      <a href="#" class="btn secondary">LinkedIn</a>
    </footer>
  </main>

  <script src="script.js"></script>
</body>

</html>
